spring:
  application:
    name: data-pipeline-engine
  datasource:
    url: jdbc:postgresql://localhost:5432/data_pipeline_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: debug
    org.flywaydb: info

